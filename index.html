<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem DeBAKTI TNA</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        /* Hide scrollbar for clean look in tables if needed */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 relative">

    <!-- Container Utama -->
    <div id="app"></div>

    <script>
        // --- DATA BERDASARKAN PDF TNA ---
        const BIDANG_DATA = [
            { id: 1, bidang: "Aplikasi Psikologi", sub: ["Aplikasi Psikologi Dalam Intervensi", "Aplikasi Psikologi Dalam Penyelidikan"] },
            { id: 2, bidang: "Bidang Tumpuan Utama Kaunseling", sub: ["Kaunseling Kerjaya", "Kaunseling Kesihatan Mental", "Kaunseling Sekolah"] },
            { id: 3, bidang: "Bimbingan dan Pementoran", sub: ["Professional Learning Community (PLC)"] },
            { id: 4, bidang: "Dasar dan Polisi", sub: ["Akta, Undang-Undang dan Peraturan", "Dasar-Dasar Kerajaan", "Pekeliling dan Surat Siaran", "Polisi Pendidikan"] },
            { id: 5, bidang: "Integriti, Nilai & Etika", sub: ["Kenegaraan", "Pembangunan Nilai Peribadi dan Profesional", "Pengetahuan dan Kepatuhan Etika"] },
            { id: 6, bidang: "Kandungan Kurikulum", sub: ["Bidang Bahasa", "Bidang Kemanusiaan", "Bidang Sains dan Matematik", "Bidang Teknik dan Vokasional"] },
            { id: 7, bidang: "Kemahiran Instruksional", sub: ["Metod dan Teknik Pengajaran", "Pedagogi Pengajaran"] },
            { id: 8, bidang: "Kemahiran Kaunseling", sub: ["Kemahiran Asas Kaunseling"] },
            { id: 9, bidang: "Kepimpinan Pendidikan", sub: ["Kemahiran Kepimpinan", "Kemahiran Pengurusan", "Pengurusan Kecemerlangan"] },
            { id: 10, bidang: "Kesejahteraan Psikologi", sub: ["Kesejahteraan Emosi", "Kesejahteraan Kewangan", "Kesejahteraan Pekerjaan", "Kesejahteraan Perhubungan"] },
            { id: 11, bidang: "Komunikasi", sub: ["Kemahiran Berbahasa", "Kemahiran Menulis", "Kemahiran Perbualan"] },
            { id: 12, bidang: "Pengurusan Data", sub: ["Penyimpanan dan Pengurusan Data"] },
            { id: 13, bidang: "Pengurusan Kualiti", sub: ["Pembangunan Kemahiran Kualiti"] },
            { id: 14, bidang: "Pengurusan Latihan", sub: ["Pelaksanaan Latihan/Program", "Penilaian dan Pemantauan", "Perancangan Latihan/Program"] },
            { id: 15, bidang: "Pengurusan Organisasi", sub: ["Asas Pengurusan Institusi Pendidikan", "Pengurusan Aset", "Pengurusan Kewangan", "Pengurusan Sumber Manusia"] },
            { id: 16, bidang: "Pengurusan Strategik", sub: ["Perancangan Strategik"] },
            { id: 17, bidang: "Pengurusan dan Pendidikan Bekeperluan Khas", sub: ["Kokurikulum dan Sukan", "PdP Pendidikan Khas", "Pengurusan Tingkah Laku", "Pentaksiran MBPK"] },
            { id: 18, bidang: "Pengurusan dan Pendidikan Prasekolah", sub: ["Keselamatan dan Kesihatan", "PdP Prasekolah", "Pengurusan Prasekolah", "Pengurusan Sumber"] },
            { id: 19, bidang: "Pengurusan dan Pengoperasian Institusi Pendidikan", sub: ["Pengoperasian Institusi Pendidikan", "Pengurusan Asrama", "Pengurusan Hal Ehwal Murid", "Pengurusan Kokurikulum"] },
            { id: 20, bidang: "Pengurusan dan Perkhidmatan Kaunseling", sub: ["Pembangunan Profesional", "Perkhidmatan Bimbingan dan Kaunseling"] },
            { id: 21, bidang: "Pentaksiran", sub: ["Pentaksiran Bilik Darjah", "Pentaksiran Psikometrik", "Pentaksiran Pusat", "Pentaksiran Aktiviti Jasmani (PAJSK)"] },
            { id: 22, bidang: "Penyelidikan", sub: ["Pengurusan Penyelidikan", "Strategi Penyelidikan"] },
            { id: 23, bidang: "Protokol dan Etiket Sosial", sub: ["Etiket Sosial dan Protokol Asas", "Etiket dalam Pengurusan Acara"] },
            { id: 24, bidang: "Teknologi Digital", sub: ["Aplikasi AI", "Aplikasi Dalam Talian", "Aplikasi Multimedia dan Grafik", "Penggunaan Aplikasi Pendidikan"] }
        ];

        // --- PENGURUSAN STATE & PENYIMPANAN DATA KEKAL ---
        let state = {
            users: JSON.parse(localStorage.getItem('tna_users')) || [],
            responses: JSON.parse(localStorage.getItem('tna_responses')) || {},
            currentUser: null,
            activeTab: 'dashboard',
            isLoginMode: true,
            authError: '',
            tempFormData: {},
            adminViewingIc: null, // ID Responden yg sedang dilihat oleh Admin
            modalConfig: null // Konfigurasi pop-up (Alert/Confirm/Prompt) gantian kepada fungsi native
        };

        function saveData() {
            localStorage.setItem('tna_users', JSON.stringify(state.users));
            localStorage.setItem('tna_responses', JSON.stringify(state.responses));
        }

        // --- GOOGLE SHEETS INTEGRATION ---
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbwTWXSzwy0cyDBDGtXbh--ptRY6rvwU8lhBjd6ku1eOQwGYXANYZLG5ULy05yMdDHnBAw/exec";

        window.syncToGoogleSheets = function(action, user, responseData = {}) {
            if (!user) return;
            
            const formData = new URLSearchParams();
            formData.append("action", action);
            formData.append("ic", user.ic);
            formData.append("name", user.name);
            formData.append("jawatan", user.jawatan);
            formData.append("responses", JSON.stringify(responseData)); // Hantar data jawapan borang sepenuhnya
            
            // Guna mode 'no-cors' untuk menghantar data secara senyap tanpa disekat oleh pelayar
            fetch(GOOGLE_SHEET_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: formData.toString()
            }).then(() => {
                console.log("Maklumat dipaut ke Google Sheets:", action);
            }).catch(error => {
                console.error("Ralat pautan ke Google Sheets:", error);
            });
        };

        // Fungsi Memuat turun/Panggil Data dari Google Sheets setiap kali sistem dibuka/refresh
        window.loadDataFromGoogleSheets = function() {
            fetch(GOOGLE_SHEET_URL + "?action=get_data", { redirect: 'follow' })
                .then(response => response.json())
                .then(data => {
                    if (data && data.users) {
                        state.users = data.users;
                        state.responses = data.responses || {};
                        saveData(); // Kemaskini cache local storage
                        render();   // Muatkan semula UI dengan data terkini
                        console.log("Data berjaya dipanggil dari Google Sheets.");
                    }
                })
                .catch(err => {
                    console.warn("Gagal mengambil data dari Google Sheets. Menggunakan rekod setempat (localStorage).", err);
                });
        };

        function getTahapKeperluan(skor) {
            if (!skor || skor === 0 || isNaN(skor)) return { label: "Tiada", color: "text-gray-500", bg: "bg-gray-100" };
            if (skor <= 2) return { label: "Rendah Keperluan", color: "text-green-700", bg: "bg-green-100" };
            if (skor <= 3) return { label: "Sederhana Keperluan", color: "text-yellow-700", bg: "bg-yellow-100" };
            return { label: "Tinggi Keperluan", color: "text-red-700", bg: "bg-red-100" };
        }

        // --- FUNGSI GLOBAL ---
        window.switchAuthMode = function() {
            state.isLoginMode = !state.isLoginMode;
            state.authError = '';
            render();
        };

        window.handleAuth = function(event) {
            event.preventDefault();
            const ic = document.getElementById('auth-ic').value.replace(/\D/g, '');
            state.authError = '';

            if (state.isLoginMode) {
                const user = state.users.find(u => u.ic === ic);
                if (user) {
                    state.currentUser = user;
                    state.activeTab = 'dashboard';
                    state.adminViewingIc = null;
                } else {
                    state.authError = "No Kad Pengenalan tidak dijumpai. Sila daftar baharu.";
                }
            } else {
                const name = document.getElementById('auth-name').value.toUpperCase();
                const jawatan = document.getElementById('auth-jawatan').value;

                if (!ic || !name) {
                    state.authError = "Sila isi semua maklumat.";
                    render();
                    return;
                }
                if (state.users.find(u => u.ic === ic)) {
                    state.authError = "No Kad Pengenalan ini telah didaftarkan.";
                    render();
                    return;
                }

                const newUser = { ic, name, jawatan };
                state.users.push(newUser);
                saveData();
                
                // Hantar pendaftaran baru ke Google Sheets
                syncToGoogleSheets('DAFTAR_PENGGUNA', newUser);

                // Paparan kembali ke log masuk automatik dgn notis
                state.isLoginMode = true;
                state.authError = "Pendaftaran berjaya! Sila log masuk dengan Kad Pengenalan anda.";
            }
            render();
        };

        window.logout = function() {
            state.currentUser = null;
            state.tempFormData = {};
            state.adminViewingIc = null;
            render();
        };

        window.switchTab = function(tab) {
            state.activeTab = tab;
            state.adminViewingIc = null; // Reset paparan admin jika tukar tab
            if (tab === 'borang') {
                state.tempFormData = { ...(state.responses[state.currentUser.ic] || {}) };
            }
            render();
        };

        window.viewUser = function(ic) {
            state.adminViewingIc = ic;
            state.activeTab = 'dashboard'; // Tunjuk borang individu di dashboard
            render();
        };

        window.backToAdminList = function() {
            state.adminViewingIc = null;
            state.activeTab = 'pengurusan'; // Kembali ke senarai pengurusan
            render();
        };

        // --- SISTEM MODAL KHAS (Menggantikan window.confirm & window.prompt) ---
        window.showModal = function(config) {
            state.modalConfig = config;
            render();
        };

        window.closeModal = function() {
            state.modalConfig = null;
            render();
        };

        window.handleModalConfirm = function() {
            if (state.modalConfig && state.modalConfig.onConfirm) {
                if (state.modalConfig.type === 'prompt') {
                    const val = document.getElementById('modal-prompt-input').value;
                    state.modalConfig.onConfirm(val);
                } else {
                    state.modalConfig.onConfirm();
                }
            }
        };

        // Fungsi Hapus Menggunakan Modal Khas
        window.hapusPengguna = function(ic) {
            const user = state.users.find(u => u.ic === ic);
            const nama = user ? user.name : "Pengguna";

            // Buka Modal Pengesahan (Ganti Confirm)
            window.showModal({
                type: 'confirm',
                title: 'Pengesahan Hapus Responden',
                message: `Adakah anda pasti mahu menghapuskan <strong>${nama}</strong> dan semua maklumat berkaitan?`,
                onConfirm: function() {
                    // Beritahu Google Sheets untuk padam/rekod penghapusan user
                    syncToGoogleSheets('HAPUS_PENGGUNA', user);

                    // Hapus data dari pangkalan data tempatan
                    state.users = state.users.filter(u => u.ic !== ic);
                    delete state.responses[ic];
                    saveData();
                    
                    // Buka Modal Makluman (Ganti Alert)
                    window.showModal({
                        type: 'alert',
                        title: 'Berjaya Dihapuskan',
                        message: `Maklumat <strong>${nama}</strong> telah berjaya dihapuskan sepenuhnya.`
                    });
                }
            });
        };

        // Fungsi Edit Menggunakan Modal Khas
        window.editUser = function(ic) {
            const user = state.users.find(u => u.ic === ic);
            if(user) {
                // Buka Modal Prompt (Ganti window.prompt)
                window.showModal({
                    type: 'prompt',
                    title: 'Kemaskini Responden',
                    message: 'Sila kemaskini Nama Lengkap Responden:',
                    inputValue: user.name,
                    onConfirm: function(newName) {
                        if(newName && newName.trim() !== "") {
                            user.name = newName.trim().toUpperCase();
                            saveData();

                            // Beritahu Google Sheets kemaskini telah berlaku
                            syncToGoogleSheets('KEMASKINI_PENGGUNA', user, state.responses[user.ic] || {});

                            window.closeModal();
                        }
                    }
                });
            }
        };

        window.handleRadioChange = function(key, value) {
            state.tempFormData[key] = parseInt(value);
            render(); 
        };

        window.handleTextChange = function(key, value) {
            state.tempFormData[key] = value;
        };

        window.submitBorang = function(event) {
            event.preventDefault();
            state.responses[state.currentUser.ic] = { ...state.tempFormData };
            saveData();

            // Hantar data penuh borang ke Google Sheets
            syncToGoogleSheets('HANTAR_BORANG', state.currentUser, state.responses[state.currentUser.ic]);

            state.activeTab = 'dashboard';
            render();
        };

        window.bukaDanEdit = function() {
            const printArea = document.getElementById('printArea');
            if(!printArea) return;
            const kandungan = printArea.innerHTML;
            
            const win = window.open('', '', 'height=800,width=1000');
            
            win.document.write('<html><head><title>Edit Sebelum Cetak</title>');
            win.document.write('<script src="https://cdn.tailwindcss.com"><\/script>');
            win.document.write('<style>');
            win.document.write('body{font-family:Arial; padding:20px;} .edit-box{border:1px dashed #ccc; padding:20px;}');
            win.document.write('@media print { .no-print { display: none !important; } .edit-box { border: none !important; padding: 0 !important; } }');
            win.document.write('</style>');
            win.document.write('</head><body>');
            
            win.document.write('<div class="no-print" style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0;">');
            win.document.write('<div><h3 style="margin:0; color:#1e293b; font-weight:bold;">Sila edit teks di bawah jika perlu:</h3><p style="margin:5px 0 0 0; font-size:14px; color:#64748b;">Anda boleh menaip terus ke dalam dokumen ini sebelum mencetak.</p></div>');
            win.document.write('<button onclick="window.print()" style="padding:10px 20px; background:#1d4ed8; color:white; font-weight:bold; border:none; border-radius:6px; cursor:pointer;">🖨️ Cetak Sekarang</button>');
            win.document.write('</div>');
            
            win.document.write('<div id="editor" contenteditable="true" class="edit-box">' + kandungan + '</div>');
            
            win.document.write('</body></html>');
            win.document.close();
        };

        // --- RENDER LOGIC ---
        function render() {
            const app = document.getElementById('app');
            if (!state.currentUser) {
                app.innerHTML = renderAuthScreen() + renderModal();
            } else {
                app.innerHTML = renderMainApp() + renderModal();
            }
            lucide.createIcons();
        }

        // Paparan Modal (Pop-up Custom)
        function renderModal() {
            if (!state.modalConfig) return '';

            const config = state.modalConfig;
            let content = '';

            if (config.type === 'alert') {
                content = `
                    <div class="flex justify-end mt-6">
                        <button onclick="closeModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-medium transition-colors shadow-sm">Tutup</button>
                    </div>`;
            } else if (config.type === 'confirm') {
                content = `
                    <div class="flex justify-end mt-6 space-x-3">
                        <button onclick="closeModal()" class="bg-gray-100 hover:bg-gray-200 text-gray-800 px-5 py-2.5 rounded-lg font-medium transition-colors border border-gray-300 shadow-sm">Batal</button>
                        <button onclick="handleModalConfirm()" class="bg-red-600 hover:bg-red-700 text-white px-5 py-2.5 rounded-lg font-medium transition-colors shadow-sm">Hapus</button>
                    </div>`;
            } else if (config.type === 'prompt') {
                content = `
                    <div class="mt-4">
                        <input type="text" id="modal-prompt-input" value="${config.inputValue}" class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors" />
                    </div>
                    <div class="flex justify-end mt-6 space-x-3">
                        <button onclick="closeModal()" class="bg-gray-100 hover:bg-gray-200 text-gray-800 px-5 py-2.5 rounded-lg font-medium transition-colors border border-gray-300 shadow-sm">Batal</button>
                        <button onclick="handleModalConfirm()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-medium transition-colors shadow-sm">Simpan</button>
                    </div>`;
            }

            let iconHtml = '';
            if(config.type === 'confirm') iconHtml = '<i data-lucide="alert-triangle" class="text-red-500 w-6 h-6"></i>';
            if(config.type === 'alert') iconHtml = '<i data-lucide="check-circle" class="text-green-500 w-6 h-6"></i>';
            if(config.type === 'prompt') iconHtml = '<i data-lucide="edit" class="text-blue-500 w-6 h-6"></i>';

            return `
                <div class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900 bg-opacity-50 backdrop-blur-sm no-print">
                    <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 border border-slate-100">
                        <h3 class="text-xl font-bold text-slate-800 mb-2 flex items-center gap-2">
                            ${iconHtml}
                            ${config.title}
                        </h3>
                        <p class="text-slate-600 text-sm">${config.message}</p>
                        ${content}
                    </div>
                </div>
            `;
        }

        function renderAuthScreen() {
            const isSuccess = state.authError && state.authError.includes('berjaya');
            const alertClass = isSuccess ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-600';
            const alertIcon = isSuccess ? 'check-circle' : 'alert-circle';
            
            const errorHtml = state.authError ? `
                <div class="${alertClass} p-3 rounded-lg flex items-center space-x-2 text-sm">
                    <i data-lucide="${alertIcon}" class="h-4 w-4"></i>
                    <span>${state.authError}</span>
                </div>
            ` : '';

            const registerFields = !state.isLoginMode ? `
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama Penuh</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="user" class="h-5 w-5 text-gray-400"></i>
                        </div>
                        <input id="auth-name" type="text" placeholder="Nama seperti dalam Kad Pengenalan" class="pl-10 w-full rounded-lg border border-gray-300 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors" required />
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Jawatan</label>
                    <select id="auth-jawatan" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
                        <option value="Guru">Guru (PPP)</option>
                        <option value="AKP">AKP (Anggota Kumpulan Pelaksana)</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
            ` : '';

            const btnText = state.isLoginMode ? 'Log Masuk' : 'Daftar Akaun';
            const btnIcon = state.isLoginMode ? 'log-in' : 'user-plus';
            const toggleText = state.isLoginMode ? "Pengguna baharu?" : "Sudah mempunyai akaun?";
            const toggleLink = state.isLoginMode ? "Daftar di sini" : "Log Masuk";

            return `
            <div class="min-h-screen bg-slate-100 flex flex-col items-center justify-center p-4 relative">
                <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden z-10 mb-8">
                    <div class="bg-blue-800 p-6 text-center">
                        <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
                            <i data-lucide="bar-chart-3" class="h-8 w-8 text-blue-800"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-white">Sistem DeBAKTI TNA</h2>
                        <p class="text-blue-200 mt-1">Analisa Keperluan Latihan</p>
                    </div>
                    
                    <form onsubmit="handleAuth(event)" class="p-8 space-y-5">
                        ${errorHtml}
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">No. Kad Pengenalan</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i data-lucide="lock" class="h-5 w-5 text-gray-400"></i>
                                </div>
                                <input id="auth-ic" type="text" maxlength="12" placeholder="Contoh: 800101011234" class="pl-10 w-full rounded-lg border border-gray-300 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors" required />
                            </div>
                        </div>
                        ${registerFields}
                        <button type="submit" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2.5 rounded-lg transition-colors flex justify-center items-center space-x-2">
                            <i data-lucide="${btnIcon}" class="h-5 w-5"></i>
                            <span>${btnText}</span>
                        </button>
                    </form>

                    <div class="bg-slate-50 p-4 text-center border-t border-slate-200">
                        <p class="text-sm text-gray-600">
                            ${toggleText} 
                            <button type="button" onclick="switchAuthMode()" class="text-blue-700 font-semibold hover:underline">
                                ${toggleLink}
                            </button>
                        </p>
                    </div>
                </div>

                <!-- Footer Log Masuk -->
                <div class="absolute bottom-6 w-full text-center text-sm text-slate-500 font-medium no-print">
                    Powered By Ts. AKBAR @2026 Hak Cipta Terpelihara
                </div>
            </div>
            `;
        }

        function renderMainApp() {
            let contentHtml = '';
            
            // Pastikan responden biasa tidak boleh akses tab admin secara tidak sah
            if (state.currentUser.jawatan !== 'Admin' && ['analisis', 'pengurusan', 'analisis_latihan'].includes(state.activeTab)) {
                state.activeTab = 'dashboard';
            }

            if (state.activeTab === 'dashboard') contentHtml = renderDashboard();
            else if (state.activeTab === 'borang') contentHtml = renderBorang();
            else if (state.activeTab === 'analisis') contentHtml = renderAnalisis();
            else if (state.activeTab === 'pengurusan') contentHtml = renderPengurusanResponden();
            else if (state.activeTab === 'analisis_latihan') contentHtml = renderAnalisisLatihan();

            const getTabClass = (tab) => state.activeTab === tab 
                ? 'bg-blue-100 text-blue-800 shadow-sm' 
                : 'text-gray-600 hover:bg-gray-100 hover:text-gray-900';

            const dashboardLabel = 'Dashboard Individu';

            let adminTabs = '';
            if (state.currentUser.jawatan === 'Admin') {
                adminTabs = `
                <button onclick="switchTab('pengurusan')" class="flex items-center space-x-2 px-4 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 ${getTabClass('pengurusan')}">
                    <i data-lucide="users" class="h-4 w-4"></i><span>Pengurusan Responden</span>
                </button>
                <button onclick="switchTab('analisis')" class="flex items-center space-x-2 px-4 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 ${getTabClass('analisis')}">
                    <i data-lucide="bar-chart-3" class="h-4 w-4"></i><span>Analisis Keseluruhan</span>
                </button>

        function renderAnalisis() {
            const stats = [];
            const validUsers = state.users.filter(u => u.jawatan !== 'Admin');
            const validIcs = validUsers.map(u => u.ic);
            
            const validResponsesArray = Object.keys(state.responses)
                .filter(ic => validIcs.includes(ic))
                .map(ic => state.responses[ic]);
                
            const totalRespondents = validResponsesArray.length;

            BIDANG_DATA.forEach(b => {
                b.sub.forEach(s => {
                    const key = `${b.bidang}|${s}`;
                    let totalScore = 0;
                    let countTinggiKeperluan = 0;

                    validResponsesArray.forEach(userRes => {
                        const score = userRes[key];
                        if (score) {
                            totalScore += score;
                            if (score >= 4) {
                                countTinggiKeperluan++;
                            }
                        }
                    });

                    const percentage = totalRespondents > 0 ? ((countTinggiKeperluan / totalRespondents) * 100).toFixed(1) : (0).toFixed(1);
                    const average = totalRespondents > 0 ? (totalScore / totalRespondents).toFixed(2) : (0).toFixed(2);

                    stats.push({
                        bidang: b.bidang,
                        sub: s,
                        percentage: parseFloat(percentage),
                        average: parseFloat(average)
                    });
                });
            });

            stats.sort((a, b) => b.percentage - a.percentage || b.average - a.average);

            const currentRespondentsCount = state.users.filter(u => u.jawatan !== 'Admin' && state.responses[u.ic]).length;

            if (stats.length === 0 || currentRespondentsCount === 0) {
                return `<div class="text-center py-12 text-gray-500">Tiada data untuk dianalisis lagi. Rekod responden dan purata skala 1 hingga 5 akan bermula apabila terdapat pendaftaran baharu yang telah menjawab (selain Admin).</div>`;
            }

            let trs = '';
            stats.forEach((item, index) => {
                let badgeClass = 'bg-slate-100 text-slate-600';
                if (index === 0) badgeClass = 'bg-yellow-400 text-yellow-900 shadow-md';
                else if (index === 1) badgeClass = 'bg-slate-300 text-slate-800 shadow-sm';
                else if (index === 2) badgeClass = 'bg-orange-300 text-orange-900 shadow-sm';

                let pctColor = 'text-slate-600';
                let barColor = 'bg-blue-400';
                if (item.percentage >= 70) { pctColor = 'text-red-600'; barColor = 'bg-red-500'; }
                else if (item.percentage >= 40) { pctColor = 'text-orange-500'; barColor = 'bg-orange-400'; }

                trs += `
                <tr class="hover:bg-slate-50">
                    <td class="px-6 py-4 text-center">
                        <span class="inline-flex items-center justify-center h-8 w-8 rounded-full font-bold text-sm ${badgeClass}">
                            ${index + 1}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-sm font-bold text-slate-800">${item.sub}</td>
                    <td class="px-6 py-4 text-sm text-slate-500">${item.bidang}</td>
                    <td class="px-6 py-4 text-sm text-center font-semibold text-slate-700">${item.average.toFixed(2)}</td>
                    <td class="px-6 py-4 text-center">
                        <div class="flex items-center justify-center space-x-2">
                            <span class="text-sm font-bold ${pctColor}">${item.percentage}%</span>
                            <div class="w-16 h-2 bg-slate-200 rounded-full overflow-hidden hidden sm:block">
                                <div class="h-full ${barColor}" style="width: ${item.percentage}%"></div>
                            </div>
                        </div>
                    </td>
                </tr>`;
            });

            return `
            <div>
                <div class="mb-8">
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">Analisis Keperluan Latihan Keseluruhan</h2>
                    <p class="text-gray-600">Ranking kursus berdasarkan peratusan responden yang meletakkan skor Tinggi (Skor 4 & 5). Pendaftaran sebagai Admin tidak dikira.</p>
                    
                    <div class="mt-4 inline-block bg-blue-50 text-blue-800 px-4 py-2 rounded-lg text-sm font-semibold border border-blue-100">
                        Jumlah Responden Semasa: ${currentRespondentsCount} Orang
                    </div>
                </div>

                <div class="overflow-x-auto rounded-xl border border-slate-200">
                    <table class="min-w-full divide-y divide-slate-200">
                        <thead class="bg-slate-800 text-white">
                            <tr>
                                <th scope="col" class="px-6 py-4 text-center text-xs font-bold uppercase tracking-wider w-16">Rank</th>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-bold uppercase tracking-wider">Sub Bidang Latihan (Kursus)</th>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-bold uppercase tracking-wider">Kategori Bidang Utama</th>
                                <th scope="col" class="px-6 py-4 text-center text-xs font-bold uppercase tracking-wider">Purata Skor</th>
                                <th scope="col" class="px-6 py-4 text-center text-xs font-bold uppercase tracking-wider">% Diperlukan (Skor ≥ 4)</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-slate-200">
                            ${trs}
                        </tbody>
                    </table>
                </div>
            </div>`;
        }

        function renderAnalisisLatihan() {
            const validUsers = state.users.filter(u => u.jawatan !== 'Admin');
            let trs = '';
            let count = 0;
            
            validUsers.forEach((user) => {
                const res = state.responses[user.ic];
                if (res && res['cadangan_latihan'] && res['cadangan_latihan'].trim() !== '') {
                    count++;
                    trs += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4 text-sm text-slate-500 text-center">${count}</td>
                        <td class="px-6 py-4 text-sm font-bold text-slate-800">${user.name}</td>
                        <td class="px-6 py-4 text-sm text-slate-600">${user.ic}</td>
                        <td class="px-6 py-4 text-sm text-slate-700 whitespace-pre-wrap">${res['cadangan_latihan']}</td>
                    </tr>`;
                }
            });

            if (count === 0) {
                return `
                <div class="text-center py-16">
                    <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i data-lucide="list-checks" class="h-10 w-10 text-blue-500"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-900 mb-2">Tiada Cadangan Latihan Ditemui</h3>
                    <p class="text-gray-500 mb-6 max-w-md mx-auto">Setakat ini, belum ada responden yang mengisi cadangan latihan manual dalam Borang TNA mereka.</p>
                </div>`;
            }

            return `
            <div>
                <div class="mb-8">
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">Analisis Latihan (Cadangan Manual)</h2>
                    <p class="text-gray-600">Senarai cadangan latihan tambahan yang diisi dan ditaip sendiri oleh para responden.</p>
                </div>

                <div class="overflow-x-auto rounded-xl border border-slate-200">
                    <table class="min-w-full divide-y divide-slate-200">
                        <thead class="bg-slate-800 text-white">
                            <tr>
                                <th scope="col" class="px-6 py-4 text-center text-xs font-bold uppercase tracking-wider w-16">Bil</th>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-bold uppercase tracking-wider w-1/4">Nama Lengkap</th>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-bold uppercase tracking-wider w-1/6">No. IC</th>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-bold uppercase tracking-wider">Teks Cadangan Latihan</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-slate-200">
                            ${trs}
                        </tbody>
                    </table>
                </div>
            </div>`;
        }

        // Initialize App & Panggil data dari Google Sheets secara background
        loadDataFromGoogleSheets();
        render();

    </script>
</body>
</html>
